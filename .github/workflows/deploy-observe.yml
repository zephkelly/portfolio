name: Deploy Observe

on:
  push:
    branches: [main]
    paths:
      - 'observe/**'
      - '.github/workflows/deploy-observe.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: main
    timeout-minutes: 30
    defaults:
      run:
        working-directory: observe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10.20.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.1.0'
          cache: 'pnpm'
          cache-dependency-path: observe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create runtime .env
        run: |
          cat > .env << 'EOL'
          ${{ secrets.OBSERVE_ENV_FILE }}
          EOL

      - name: Build for production
        timeout-minutes: 10
        run: pnpm run build
        env:
          NODE_ENV: production
          CI: true
          # Bake the persistent, out-of-deploy-dir SQLite path into the build so
          # releases never wipe collected observability data.
          OBSERVE_DB_PATH: /mnt/data/observe-data/observe.sqlite3

      - name: Verify build output
        run: ls -la .output/server/index.mjs

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r .output deploy/.output
          cp .env deploy/.env
          cp ecosystem.config.cjs deploy/ecosystem.config.cjs

          # ecosystem.config.cjs does `require('dotenv')` when PM2 evaluates it.
          # The standalone Nitro bundle doesn't expose dotenv to the config file,
          # so ship just dotenv (no deps). With shamefully-hoist, dotenv lives at
          # the observe working-dir node_modules.
          mkdir -p deploy/node_modules
          cp -rL node_modules/dotenv deploy/node_modules/dotenv

          tar -czf observe-build.tar.gz -C deploy .
          ls -lh observe-build.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        timeout-minutes: 5
        run: |
          SSH_OPTS="-o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=20 -o ServerAliveCountMax=5"
          scp -i ~/.ssh/deploy_key $SSH_OPTS observe-build.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy_key $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          # Load NVM and ensure the pinned Node version is present (install if missing)
          # nvm lives on the secondary EBS volume (/mnt/data) to keep the small root disk free
          export NVM_DIR="/mnt/data/nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 25.1.0
          nvm use 25.1.0

          # Ensure pm2 is available for this Node version
          command -v pm2 >/dev/null 2>&1 || npm install -g pm2

          # Persistent SQLite dir, created ONCE and never wiped by a deploy.
          # Must match OBSERVE_DB_PATH baked into the build above.
          sudo mkdir -p /mnt/data/observe-data
          sudo chown "$(whoami)":"$(whoami)" /mnt/data/observe-data

          # Stop the current app
          pm2 stop Observe || true
          pm2 delete Observe || true

          # Back up the app dir only (NOT observe-data) for quick rollback
          sudo rm -rf /mnt/data/observe-backup
          sudo mv /mnt/data/observe /mnt/data/observe-backup || true

          # Create deployment directory owned by the deploy user
          sudo mkdir -p /mnt/data/observe
          sudo chown "$(whoami)":"$(whoami)" /mnt/data/observe

          # Extract the new build
          tar -xzf /tmp/observe-build.tar.gz -C /mnt/data/observe
          rm /tmp/observe-build.tar.gz

          chmod -R 755 /mnt/data/observe

          # Start with PM2 (reads ecosystem.config.cjs -> port 8001)
          cd /mnt/data/observe
          pm2 start ecosystem.config.cjs --cwd /mnt/data/observe
          pm2 save

          pm2 status
          sleep 3
          pm2 logs Observe --lines 30 --nostream || true
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment Summary
        run: |
          echo "### 🚀 Observe Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** nuxt-observe host" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version:** 25.1.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Path:** /mnt/data/observe" >> $GITHUB_STEP_SUMMARY
          echo "- **Data (persistent):** /mnt/data/observe-data" >> $GITHUB_STEP_SUMMARY
          echo "- **Process Manager:** PM2 (port 8001)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
